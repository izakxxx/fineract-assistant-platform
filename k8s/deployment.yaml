apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-platform
  namespace: hello-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hello-platform
  template:
    metadata:
      labels:
        app: hello-platform
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
